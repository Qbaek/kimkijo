<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    background: #F5F0E8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif KR', serif;
  }
  .card {
    text-align: center;
  }
  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.2em;
    color: rgba(44,31,14,0.4);
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .name-ko {
    font-size: 80px;
    font-weight: 300;
    color: #2C1F0E;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .name-en {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    letter-spacing: 0.15em;
    color: rgba(44,31,14,0.5);
    margin-bottom: 32px;
  }
  .divider {
    width: 60px;
    height: 1px;
    background: #8B6340;
    margin: 0 auto 32px;
  }
  .desc {
    font-size: 18px;
    color: rgba(44,31,14,0.6);
    letter-spacing: 0.05em;
    line-height: 1.8;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Ceramist · Professor · Artist</div>
    <div class="name-ko">김기조</div>
    <div class="name-en">Kim Ki-Jo · 1949–</div>
    <div class="divider"></div>
    <div class="desc">흙과 불, 50년의 시간이 빚은 예술 세계를 기억합니다.</div>
  </div>
</body>
</html>
